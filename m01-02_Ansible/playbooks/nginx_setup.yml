---
- name: nginx | Установка и настройка nginx
  hosts: nginx
  become: true
  vars:
     nginx_listen_port: 8080

  tasks:
     - name: update
       apt:
         update_cashe = yes
       tags:
         - update apt
    r


- name: NGINX | Create NGINX config file from template
  hosts: nginx
  become: true
  vars:
    nginx_listen_port: 8000
template:
src: templates/nginx.conf.j2
dest: /tmp/nginx.conf
tags:
- nginx-configuration
