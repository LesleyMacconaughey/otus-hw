---
- name: find_alert_setup
  hosts: hw09
  tasks:
    - name: copy files
      become: true
      become_method: sudo
      become_user: root
      copy:
        src: files/watchlog
        dest: /etc/sysconfig/
        owner: root
        group: root
        mode: '0644'
     copy:
        src: files/watchlog.sh
        dest: /opt/
        owner: root
        group: root
        mode: '0744'
     copy:
        src: files/watchlog.service
        dest: /etc/systemd/system/
        owner: root
        group: root
        mode: '0644'
     copy:
        src: files/watchlog.timer
        dest: /etc/systemd/system/
        owner: root
        group: root
        mode: '0644'