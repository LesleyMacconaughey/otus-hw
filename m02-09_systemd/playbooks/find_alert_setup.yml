---
- name: find_alert_setup
  hosts: centos8-hw09
  tasks:

    - name: copy settings
      become: true
      become_method: sudo
      become_user: root
      copy:
        src: files/watchlog
        dest: /etc/sysconfig/
        owner: root
        group: root
        mode: '0644'

    - name: copy logfile
      become: true
      become_method: sudo
      become_user: root
      copy:
        src: files/watchlog.log
        dest: /var/log/
        owner: root
        group: root
        mode: '0644'


    - name: copy script
      become: true
      become_method: sudo
      become_user: root
      copy:
        src: files/watchlog.sh
        dest: /opt/
        owner: root
        group: root
        mode: '0744'

    - name: copy service
      become: true
      become_method: sudo
      become_user: root
      copy:
        src: files/watchlog.service
        dest: /etc/systemd/system/
        owner: root
        group: root
        mode: '0644'

    - name: copy timer
      become: true
      become_method: sudo
      become_user: root 
      copy:
        src: files/watchlog.timer
        dest: /etc/systemd/system/
        owner: root
        group: root
        mode: '0644'

    - name: Reload systemd daemon
      become: true
      become_method: sudo
      systemd_service:
        daemon_reload: yes

    - name: Enable a service unit
      become: true
      become_method: sudo
      systemd_service:
        name: watchlog.service
        state: started

    - name: Enable a timer unit
      become: true
      become_method: sudo
      systemd_service:
        name: watchlog.timer
        state: started
 